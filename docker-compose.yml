version: "3.8"
services:

  adventure_game:
    build:
      context: .
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PYTHONPATH=/home/adventure_game/
    volumes:
      - ./adventure_game.py:/home/adventure_game/adventure_game.py
      - ./app:/home/adventure_game/app
      - ./game.py:/home/adventure_game/game.py
    depends_on:
      - database


  database:
    image: postgres:10
    ports:
      - "5432:5432"
    env_file:
      - .env